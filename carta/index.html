<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="Carta de Bolera Contrastes — pub, cafetería, 1x2, cervecería y comida temática."
    />
    <title>Carta · Bolera Contrastes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Urbanist:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" href="/assets/logo.jpeg" />
    <meta name="theme-color" content="#111827" />
  </head>
  <body class="menu-body">
    <a class="skip-link" href="#carta">Saltar al menú</a>

    <header class="menu-header">
      <div class="container menu-header__inner">
        <a class="menu-home" href="/" aria-label="Volver al inicio">Inicio</a>

        <div class="menu-brand" aria-label="Bolera Contrastes">
          <img class="menu-brand__logo" src="/assets/logo.jpeg" alt="Bolera Contrastes" />
          <div class="menu-brand__text">
            <div class="menu-brand__name">bolera <span>CONTRASTES</span></div>
            <div class="menu-brand__tag">PUB · CAFETERÍA · 1X2 · CERVECERÍA · COMIDA TEMÁTICA</div>
          </div>
        </div>
      </div>
    </header>

    <nav class="menu-tabs" aria-label="Secciones de la carta">
      <div class="container menu-tabs__inner" data-tabs>
        <!-- Render por JS -->
      </div>
    </nav>

    <main id="carta" class="menu-main">
      <div class="container">
        <div class="menu-tools" aria-label="Herramientas de carta">
          <label class="search" aria-label="Buscar en la carta">
            <span class="search__icon" aria-hidden="true">⌕</span>
            <input
              class="search__input"
              type="search"
              placeholder="Buscar (ej: sepia, bocata, ensalada...)"
              autocomplete="off"
              data-search
            />
          </label>
          <button class="tool-btn" type="button" data-filter-toggle>Filtrar alérgenos</button>
        </div>

        <section class="filters" data-filters hidden>
          <div class="filters__title">Ocultar productos que contengan:</div>
          <div class="filters__grid" data-allergen-filters></div>
          <div class="filters__actions">
            <button class="tool-btn tool-btn--ghost" type="button" data-filter-clear>Limpiar</button>
          </div>
        </section>

        <header class="menu-title">
          <div class="menu-title__bar" aria-hidden="true"></div>
          <h1 class="menu-title__text" data-section-title>Para Picar</h1>
        </header>

        <div class="menu-grid" data-menu-grid></div>
      </div>
    </main>

    <footer class="allergens" aria-label="Leyenda de alérgenos">
      <div class="container allergens__inner" data-allergens></div>
    </footer>

    <script src="/app.js" defer></script>
  </body>
</html>
